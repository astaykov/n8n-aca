events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Serve files with exact extensions directly (no clean-URL rewriting).
        # This is critical for MSAL v2: redirect.html must be served as-is,
        # not redirected to /redirect (which would break the auth code flow).
        location ~* \.(html|js|css|svg|ico|json|png|jpg|woff2?)$ {
            try_files $uri =404;
        }

        # SPA fallback for non-asset paths
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
